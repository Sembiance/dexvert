[IM_NAPLP]
~Default Mode=Standard Options
~Mode=Standard Options
~Header=NAPLPS Import Filter Setup

Standard Options=IM_NAPLP.0
ANSI=IM_NAPLP.1
General Parametrics=IM_NAPLP.2
IBM PC Videotex=IM_NAPLP.3


[Standard Options]
DefaultFileSpec=\ota\data\*.*
Driver=IM_NAPLP.0
ColorTableSource=FILE


[ANSI]
DefaultFileSpec=\ota\data\nap_ansi\*.nap
Driver=IM_NAPLP.1
ColorTableSource=FILE
Font[001]="NAPLPS_FONT", "Roman:Tms Rmn"


[General Parametrics]
DefaultFileSpec=\ota\data\pic_gp\*.pic
Driver=IM_NAPLP.2
ColorTableSource=FILE
Font[001]="SSS", "Swiss:Helvetica"
Font[002]="MSS", "Swiss:Helvetica"
Font[003]="LSS", "Swiss:Helvetica"
Font[004]="SS", "Roman:Tms Rmn"
Font[005]="MS", "Roman:Tms Rmn"
Font[006]="LS", "Roman:Tms Rmn"


[IBM PC Videotex]
DefaultFileSpec=\ota\data\pdi_vdtx\*.pdi
Driver=IM_NAPLP.3
ColorTableSource=FILE
Font[001]="NAPLPS_FONT", "Roman:Times New Roman"
