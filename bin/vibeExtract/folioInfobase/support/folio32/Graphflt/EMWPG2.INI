[EMWPG]
~Default Mode=Monochrome Printing
~Mode=Standard Options
~Header=WPG Output Filter Setup

Standard Options=EMWPG.2
Monochrome Printing=EMWPG.1


[Standard Options]
DefaultFileSpec=\ota\new_data\*.wpg
Driver=EMWPG.2
Font[001]="", "Modern:Courier"
Font[002]="", "Modern:Courier Bold"
Font[003]="", "Modern:Courier Oblique"
Font[004]="", "Modern:Courier Bold Oblique"
Font[005]="", "Swiss:Helvetica"
Font[006]="", "Swiss:Helvetica Bold"
Font[007]="", "Swiss:Helvetica Oblique"
Font[008]="", "Swiss:Helvetica Bold Oblique"
Font[009]="", "Roman:Tms Rmn"
Font[010]="", "Roman:Tms Rmn Bold"
Font[011]="", "Roman:Tms Rmn Italic"
Font[012]="", "Roman:Tms Rmn Bold Italic"
Text Mode=115
Line Mode=119
Fill Mode=122
Color Mode=103

[Monochrome Printing]
DefaultFileSpec=\ota\new_data\*.wpg
Driver=EMWPG.1
Font[001]="", "Modern:Courier"
Font[002]="", "Modern:Courier Bold"
Font[003]="", "Modern:Courier Oblique"
Font[004]="", "Modern:Courier Bold Oblique"
Font[005]="", "Swiss:Helvetica"
Font[006]="", "Swiss:Helvetica Bold"
Font[007]="", "Swiss:Helvetica Oblique"
Font[008]="", "Swiss:Helvetica Bold Oblique"
Font[009]="", "Roman:Tms Rmn"
Font[010]="", "Roman:Tms Rmn Bold"
Font[011]="", "Roman:Tms Rmn Italic"
Font[012]="", "Roman:Tms Rmn Bold Italic"
Text Mode=115
Line Mode=119
Fill Mode=122
Color Mode=103
